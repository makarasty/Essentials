# PvP mode settings
pvp:
  # Peace mode settings (disables all player vs player combat)
  peace:
    # Enable peace mode (no damage between players)
    enabled: false
    # Duration of peace mode in seconds (0 = permanent peace mode)
    time: 0
  # Border mode settings (kills players outside the map boundaries)
  border:
    # Enable border protection (kills players who go outside the map)
    enabled: false
# Allow players to destroy cores in PvP mode
destroyCore: false
# Account system settings (requires player authentication)
account:
  # Enable account authentication system
  enabled: false
  # Authentication method: None, Password, or Discord
  authType: "None"
  # Discord OAuth URL for Discord-based authentication
  discordURL: ""
# Core protection settings
protect:
  # Make all cores indestructible (health set to 100 million)
  unbreakableCore: false
  # Detect and prevent power graph manipulation exploits
  powerDetect: false
# Player rule enforcement settings
rules:
  # Block players using VPN connections
  vpn: false
  # Block players with "foo" in their name (deprecated - not implemented)
  foo: false
  # Block mobile players from joining
  mobile: false
  # Block non-Steam players (deprecated - not implemented)
  steamOnly: false
  # Enforce minimum username length
  minimalName:
    # Enable username length check
    enabled: false
    # Minimum required character length for usernames
    length: 0
  # Strict mode - forces player name to match registered name
  strict: false
  # Block completely new players (only allow returning players)
  blockNewUser: false
