# Plugin configuration
plugin:
  # Default language code (en: English, ko: Korean, etc.)
  lang: "en"
  # Automatically update the plugin when new version is available
  autoUpdate: true
  # Database configuration
  database:
    # Database connection URL (h2: embedded database, mysql: MySQL, etc.)
    url: "h2:./config/mods/Essentials/data/database"
    # Database username
    username: "sa"
    # Database password
    password: ""
# Feature settings
feature:
  # AFK (Away From Keyboard) detection
  afk:
    enabled: false
    # Time in seconds before player is marked as AFK
    time: 300
    # Server to teleport AFK players to (empty = disable teleport)
    server: ""

  # Setting for evoting features
  evote:
    # Use plugin voting system (default: true)
    enabled: true
    # Enable vote kick feature
    enableVotekick: false
  # Unit (block) usage limits
  unit:
    enabled: false
    # Maximum number of blocks a player can place
    limit: 3000
  # Message of the Day (MOTD)
  motd:
    enabled: false
    # Update interval in seconds
    time: 600
  # PvP-related features
  pvp:
    # Automatically assign teams in PvP
    autoTeam: false
    # Spectator mode for defeated players
    spector: false
  # Leveling system
  level:
    # Visual effects for leveling up
    effect:
      enabled: false
      # Trigger effect only when moving
      moving: false
    # Show level-up notification
    levelNotify: false
    # Display level information
    display: false
  # Game mode settings (wave survival, etc.)
  game:
    wave:
      # Process 1 + n waves (default is 1)
      autoSkip: 1
  # Player name blacklist settings
  blacklist:
    enabled: true
    # Use regex patterns for blacklist matching
    regex: false
  # Show total player count on server list
  count: false
# Module enable/disable settings
module:
  achievement: false
  bridge: false
  chat: true
  discord: false
  protect: true
  web: false
# Command settings
command:
  # Vote skip command configuration
  skip:
    enabled: true
    # Maximum number of skips allowed
    limit: 10
  # Rollback command configuration
  rollback:
    enabled: true
    # Set how often to save. (Time unit: minute, default: 10)
    time: 10
