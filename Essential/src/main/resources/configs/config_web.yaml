# Port number for the web server
port: 32000
# Directory path where uploaded map files are stored
uploadPath: "config/maps"
# Secret key used for encrypting session cookies
sessionSecret: "essentialWebSecret"
# Session validity duration in seconds (1 hour = 3600 seconds)
sessionDuration: 3600
# Maximum file upload size in bytes (10 MB = 10485760 bytes)
maxFileSize: 10485760
# Discord server invitation URL shown to users who need to link their account
discordUrl: "https://discord.gg/yourserver"
# Enable WebSocket for real-time communication between web server and clients
enableWebSocket: true
