# Global default chat format (leave empty to use permission group formats)
# Placeholders: {player} for player name, {message} for chat message
chatFormat: ""
# Strict chat filtering (deprecated - not implemented)
strict:
  # Enable strict filtering (currently unused)
  enabled: false
  # Language code for filtering (ko-KR: Korean, en-US: English, etc.)
  language: "ko-KR"
# Chat blacklist settings
blacklist:
  # Enable blacklist filtering to block prohibited words in chat
  enabled: false
  # Use regex patterns for blacklist entries instead of plain text
  regex: false
